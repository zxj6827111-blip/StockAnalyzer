services:
  api:
    environment:
      SA__NOTIFICATIONS__PRIMARY: ${SA__NOTIFICATIONS__PRIMARY:-wecom}
      SA__NOTIFICATIONS__BACKUP: ${SA__NOTIFICATIONS__BACKUP:-console}
      SA__WECOM_INTERACTION__ENABLED: ${SA__WECOM_INTERACTION__ENABLED:-false}
      SA__FEISHU_INTERACTION__ENABLED: ${SA__FEISHU_INTERACTION__ENABLED:-true}
      SA__SECURITY__API_AUTH_ENABLED: ${SA__SECURITY__API_AUTH_ENABLED:-true}
      SA__SECURITY__API_TOKEN: ${SA__SECURITY__API_TOKEN:-}
      SA__AUTO_PROMOTION__ENABLED: ${SA__AUTO_PROMOTION__ENABLED:-false}
      SA__AUTO_PROMOTION__AUTO_LOAD_PREDICTOR: ${SA__AUTO_PROMOTION__AUTO_LOAD_PREDICTOR:-true}
      SA__AUTO_PROMOTION__NOTIFY_ON_REJECTION: ${SA__AUTO_PROMOTION__NOTIFY_ON_REJECTION:-true}
      SA__AUTO_PROMOTION__NOTIFY_ON_TRAINING_SUMMARY: ${SA__AUTO_PROMOTION__NOTIFY_ON_TRAINING_SUMMARY:-true}
      SA__AUTO_PROMOTION__NOTIFY_ON_MANUAL_RELEASE_PENDING: ${SA__AUTO_PROMOTION__NOTIFY_ON_MANUAL_RELEASE_PENDING:-true}
      SA__ACCEPTANCE__AUTO_RUN: "true"
      SA__ACCEPTANCE__AUTO_NOTIFY: "true"
      SA__NOTIFICATION_FILTER__QUIET_WINDOWS: '["23:00-08:30"]'
      SA__TDX_SYNC__AUTO_RUN: "false"

  scheduler:
    environment:
      SA__NOTIFICATIONS__PRIMARY: ${SA__NOTIFICATIONS__PRIMARY:-wecom}
      SA__NOTIFICATIONS__BACKUP: ${SA__NOTIFICATIONS__BACKUP:-console}
      SA__WECOM_INTERACTION__ENABLED: ${SA__WECOM_INTERACTION__ENABLED:-false}
      SA__FEISHU_INTERACTION__ENABLED: ${SA__FEISHU_INTERACTION__ENABLED:-true}
      SA__SECURITY__API_AUTH_ENABLED: ${SA__SECURITY__API_AUTH_ENABLED:-true}
      SA__SECURITY__API_TOKEN: ${SA__SECURITY__API_TOKEN:-}
      SA__AUTO_PROMOTION__ENABLED: ${SA__AUTO_PROMOTION__ENABLED:-false}
      SA__AUTO_PROMOTION__AUTO_LOAD_PREDICTOR: ${SA__AUTO_PROMOTION__AUTO_LOAD_PREDICTOR:-true}
      SA__AUTO_PROMOTION__NOTIFY_ON_REJECTION: ${SA__AUTO_PROMOTION__NOTIFY_ON_REJECTION:-true}
      SA__AUTO_PROMOTION__NOTIFY_ON_TRAINING_SUMMARY: ${SA__AUTO_PROMOTION__NOTIFY_ON_TRAINING_SUMMARY:-true}
      SA__AUTO_PROMOTION__NOTIFY_ON_MANUAL_RELEASE_PENDING: ${SA__AUTO_PROMOTION__NOTIFY_ON_MANUAL_RELEASE_PENDING:-true}
      SA__ACCEPTANCE__AUTO_RUN: "true"
      SA__ACCEPTANCE__AUTO_NOTIFY: "true"
      SA__NOTIFICATION_FILTER__QUIET_WINDOWS: '["23:00-08:30"]'
      SA__TDX_SYNC__AUTO_RUN: "false"
      SCHEDULER_POLL_SEC: "30"
